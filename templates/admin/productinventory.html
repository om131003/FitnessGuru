{% extends "admin/layout.html" %}

{% block content %}

<!-- Main Content -->
      <div class="main-content">
        <section class="section">
          <div class="section-body">
            <div class="row">
              <div class="col-12 col-md-6 col-lg-6">
                
                <div class="card">
                  <form action="{{url_for('add_product')}}" method="POST" enctype="multipart/form-data" class="needs-validation" novalidate="">
                    <div class="card-header">
                      <h4>Product inventory</h4>
                    </div>
                    <div class="card-body">
                      <div class="form-group">
                        <label>Product name</label>
                        <input type="text" name="p_name" id="p_name" class="form-control" required="">
                        <div class="invalid-feedback">
                          What is your product name ?
                        </div>
                      </div>
                      <div class="form-group">
                        <label>Quantity in stock</label>
                        <input type="text" name="p_quantityinstock" id="p_quantityinstock" class="form-control" required="">
                        <div class="invalid-feedback">
                          what is the quantity of product.
                        </div>
                      </div>
                      <div class="form-group">
                        <label>Unit price</label>
                        <input type="text" name="p_unitprice" id="p_unitprice" class="form-control" required="">
                        <div class="invalid-feedback">
                          what is per unit price.
                        </div>
                      </div>
                      <div class="form-group">
                        <label>Product image</label>
                        <input type="file" name="p_image" id="p_image" class="form-control" required="">
                        <div class="invalid-feedback">
                          what is product image.
                        </div>
                      </div>
                      <div class="form-group mb-0">
                        <label>Product Description	</label>
                        <textarea class="form-control"name="p_description" id="p_description"  required=""></textarea>
                        <div class="invalid-feedback">
                          What do you wanna say?
                        </div>
                      </div>
                    </div>
                    <div class="card-footer text-right">
                      <button type="submit" class="btn btn-primary">Submit</button>
                    </div>
                  </form>
                </div>
              </div>
              
                </div>
              </div>
            </div>
          </div>
        </section>

        {% endblock %}
