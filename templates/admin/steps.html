{% extends "admin/layout.html" %}

{% block content %}

<!-- Main Content -->
<div class="main-content">
  <section class="section">
    <div class="section-body">
      <div class="row">
        <div class="col-12 col-md-6 col-lg-6">

          <div class="card">
            <form action="{{ url_for('add_steps') }}" method="POST" class="needs-validation" novalidate="">
              <div class="card-header">
                <h4>Reciep steps form</h4>
              </div>
              <div class="card-body">
                <div class="form-group">
                  <label>recipe name</label>
                  <select class="form-control" required="" name="recipe_name">
                    <option value="">Select category</option>
                    {% for cat in view_dietplans %}
                    <option value="{{cat[0]}}">{{cat[2]}}</option>
                    {% endfor %}

                  </select>

                </div>

                <div class="form-group mb-0">
                  <label>Description </label>
                  <textarea class="form-control" name="st_description" required="" placeholder="message"></textarea>
                  <div class="invalid-feedback">
                    what is description ?
                  </div>
                </div>


                <div class="form-group mb-0">
                  <label>Ingredients</label>
                  <textarea class="form-control" name="st_ingredients" required="" placeholder="message"></textarea>
                  <div class="invalid-feedback">
                    what is description ?
                  </div>
                </div>
              </div>
          </div>

          <div class="card-footer text-right">
            <button type="submit" class="btn btn-primary">Submit</button>
          </div>
          </form>
        </div>
      </div>

      </form>
    </div>
</div>
</div>
</div>
</section>

{% endblock %}
