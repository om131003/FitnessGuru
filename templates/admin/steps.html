{% extends "admin/layout.html" %}

{% block content %}

<div class="main-content">
  <section class="section">
    <div style="max-width:1400px;margin:0 auto;padding:0 24px 40px;">

      <!-- ── Page Header ── -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;">
        <div>
          <h1 style="font-family:'Poppins',sans-serif;font-size:26px;font-weight:800;color:#1a2035;margin:0;">
            Recipe Steps
          </h1>
          <p style="margin:4px 0 0;font-size:14px;color:#64748b;">
            Detailed instructions and ingredients for your meal plans.
          </p>
        </div>
        <a href="{{url_for('view_resteps')}}" class="btn btn-secondary">
          <i class="fas fa-list me-1"></i> View All Steps
        </a>
      </div>

      <div class="row">
        <div class="col-12 col-md-10 col-lg-8">
          <div class="card">
            <form action="{{ url_for('add_steps') }}" method="POST" class="needs-validation" novalidate="">
              <div class="card-header">
                <h4>Instruction Form</h4>
              </div>
              <div class="card-body">
                <div class="form-group">
                  <label>Target Recipe</label>
                  <select class="form-control" required="" name="recipe_name">
                    <option value="">Select recipe for instructions</option>
                    {% for cat in view_dietplans %}
                    <option value="{{cat[0]}}">{{cat[2]}}</option>
                    {% endfor %}
                  </select>
                  <div class="invalid-feedback">Please select a recipe.</div>
                </div>

                <div class="form-group">
                  <label>Core Ingredients</label>
                  <textarea class="form-control" name="st_ingredients" style="height:120px;" required="" placeholder="List ingredients separated by line breaks..."></textarea>
                  <div class="invalid-feedback">Please list the ingredients.</div>
                </div>

                <div class="form-group mb-0">
                  <label>Step-by-Step Instructions</label>
                  <textarea class="form-control" name="st_description" style="height:180px;" required="" placeholder="1. Boil water...
2. Add salt..."></textarea>
                  <div class="invalid-feedback">Please provide instructions.</div>
                </div>
              </div>
              <div class="card-footer" style="background:#fcfcfd;border-top:1px solid #f1f5f9;display:flex;justify-content:flex-end;">
                <button type="submit" class="btn btn-primary">
                  <i class="fas fa-save me-1"></i> Finalize Steps
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>

    </div>
  </section>
</div>

{% endblock %}
