{% extends "admin/layout.html" %}

{% block content %}

      <div class="main-content">

          <div class="section-body">
            <div class="row">
              <div class="col-12 col-md-6 col-lg-6">
                
                <div class="card">
                  <form action="{{url_for('add_dietcat')}}" method="POST" enctype="multipart/form-data" class="needs-validation" novalidate="">
                    <div class="card-header">
                      <h4>Diet category</h4>
                    </div>
                    <div class="card-body">
                      
                      <div class="form-group">
                        <label>Diet name</label>

                          What is your diet ?
                        </div>
                      </div>
                      <div class="form-group">
                        <label>Diet image	</label>
                        <input type="file" name="dc_image" id="dc_image" class="form-control" required="">
                        <div class="invalid-feedback">
                          Oh no! image is invalid.
                        </div>
                      </div>
                      <!-- <div class="form-group mb-0">
                        <label>Exercise_Description	</label>
                        <textarea class="form-control" required=""></textarea>
                        <div class="invalid-feedback">
                          What do you wanna say?
                        </div>
                      </div>
                    </div> -->
                    <div class="card-footer text-right">
                      <button type="submit" class="btn btn-primary">Submit</button>
                    </div>
                  </form>
                </div>
              </div>
              
                  </form>
                </div>
              </div>
            </div>
          </div>
        </section>

        {% endblock %}
