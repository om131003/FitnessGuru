{% extends "admin/layout.html" %}

{% block content %}

<div class="main-content">
  <section class="section">
    <div style="max-width:1400px;margin:0 auto;padding:0 24px 40px;">

      <!-- ── Page Header ── -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;">
        <div>
          <h1 style="font-family:'Poppins',sans-serif;font-size:26px;font-weight:800;color:#1a2035;margin:0;">
            Diet Categories
          </h1>
          <p style="margin:4px 0 0;font-size:14px;color:#64748b;">
            Add and manage categories for your meal plans.
          </p>
        </div>
        <a href="{{url_for('view_dietcat')}}" class="btn btn-secondary">
          <i class="fas fa-list me-1"></i> View All Categories
        </a>
      </div>

      <div class="row">
        <div class="col-12 col-md-8 col-lg-6">
          <div class="card">
            <form action="{{url_for('add_dietcat')}}" method="POST" enctype="multipart/form-data" class="needs-validation" novalidate="">
              <div class="card-header">
                <h4>Create New Category</h4>
              </div>
              <div class="card-body">
                
                <div class="form-group">
                  <label>Category name</label>
                  <input type="text" name="dc_name" id="dc_name" class="form-control" placeholder="e.g. Keto, Vegan, Bulk" required="">
                  <div class="invalid-feedback">
                    Please provide a category name.
                  </div>
                </div>

                <div class="form-group">
                  <label>Representative Image</label>
                  <input type="file" name="dc_image" id="dc_image" class="form-control" required="">
                  <div class="invalid-feedback">
                    Please upload an image.
                  </div>
                  <small class="form-text text-muted">A clear image helps members identify the diet plan easily.</small>
                </div>

              </div>
              <div class="card-footer" style="background:#fcfcfd;border-top:1px solid #f1f5f9;display:flex;justify-content:flex-end;">
                <button type="submit" class="btn btn-primary">
                  <i class="fas fa-check-circle me-1"></i> Save Category
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>

    </div>
  </section>
</div>

{% endblock %}
