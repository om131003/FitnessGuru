{% extends "admin/layout.html" %}

{% block content %}

<!-- Main Content -->
      <div class="main-content">
        <section class="section">
          <div class="section-body">
            <div class="row">
              <div class="col-12 col-md-6 col-lg-6">
                
                <div class="card">
                  <form action="{{url_for('update_product')}}" method="POST" enctype="multipart/form-data" class="needs-validation" novalidate="">
                    {% for j in view_product %}

                    <div class="card-header">
                      <h4>Update Product inventory</h4>
                    </div>
                    <div class="card-body">
                      <div class="form-group">
                        <input type="text" name="product_id" value="{{j[0]}}" hidden>
                        <label>Product name</label>
                        <input type="text" name="p_name" value="{{j[1]}}" id="p_name" class="form-control" required="">
                        <div class="invalid-feedback">
                          What is your product name ?
                        </div>
                      </div>
                      <div class="form-group">
                        <label>Quantity in stock</label>
                        <input type="text" name="p_quantityinstock" value="{{j[2]}}" id="p_quantityinstock" class="form-control" required="">
                        <div class="invalid-feedback">
                          what is the quantity of product.
                        </div>
                      </div>
                      <div class="form-group">
                        <label>Unit price</label>
                        <input type="text" name="p_unitprice" value="{{j[3]}}" id="p_unitprice" class="form-control" required="">
                        <div class="invalid-feedback">
                          what is per unit price.
                        </div>
                      </div>
                      <div class="form-group">
                        <label>Product image</label>
                        <input type="file" name="p_image" value="{{j[4]}}" id="p_image" class="form-control" required="">
                        <img src="../{{j[4]}}" height="100" width="100">
                        <div class="invalid-feedback">
                          what is product image.
                        </div>
                      </div>
                      <div class="form-group mb-0">
                        <label>Product Description	</label>
                        <textarea class="form-control"name="p_description" id="p_description"  required="">{{j[5]}}</textarea>
                        <div class="invalid-feedback">
                          What do you wanna say?
                        </div>
                      </div>
                    </div>
                    <div class="card-footer text-right">
                      <button type="submit" class="btn btn-primary">Update</button>
                      <a href ="{{url_for('view_product')}}" class="btn btn-secondary">Cancel</a>
                    </div>
                  </form>
                </div>
              </div>
              {%endfor%}
                </div>
              </div>
            </div>
          </div>
        </section>

        {% endblock %}
