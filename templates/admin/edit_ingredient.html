{% extends "admin/layout.html" %}

{% block content %}

<!-- Main Content -->
      <div class="main-content">
        <section class="section">
          <div class="section-body">
            <div class="row">
              <div class="col-12 col-md-6 col-lg-6">
                
                <div class="card">
                  <form  action="{{ url_for('update_reccat')}}" class="needs-validation" method="POST"  novalidate="">
                    {% for j in view_reccat %}
                    <div class="card-header">
                      <h4>Update Recipe ingredient</h4>
                    </div>

                    <div class="card-body">
                        <input type="text" name="ingredient_id" value="{{j[0]}}" hidden>
                      <div class="form-group">
                        <label>recipe name  </label>
                         <select class="form-control" required="" value="{{j[1]}}" name="diet_id">
                        {% for cat in view_dietplans %}
                        <option value="{{ cat[0] }}" {% if cat[0]|int == j[1]|int %}selected{% endif %}>
                        {{ cat[2] }}
                        </option>
                        
                        {% endfor %}

                        </select>
                        
                      </div>

                      <div class="form-group">
                        <label>ingredient  </label>
                        <input type="text" class="form-control" value="{{j[2]}}"  name="ri_ingredientname" required=""placeholder="ingredient">
                        <div class="invalid-feedback">
                         ingredient name ?
                        </div>
                      </div>
                      <div class="form-group">
                        <label> Quantity</label>
                        <input type="text" class="form-control" value="{{j[3]}}" name="ri_quantity" required="" placeholder="eg . 1 or 2 gram,">
                        <div class="invalid-feedback">
                          How much Quantity ?
                        </div>
                      </div>
                      
                    <div class="card-footer text-right">
                      <button type="submit" class="btn btn-primary">Update</button>
                      <a href ="{{url_for('view_recieping')}}" class="btn btn-secondary">Cancel</a>
                    </div>
                  </form>
                </div>
              </div>
              
                  {%endfor%}
                </div>
              </div>
            </div>
          </div>
        </section>

        {% endblock %}
