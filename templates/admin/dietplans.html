{% extends "admin/layout.html" %}

{% block content %}

<!-- Main Content -->
      <div class="main-content">
        <section class="section">
          <div class="section-body">
            <div class="row">
              <div class="col-12 col-md-6 col-lg-6">
                
                <div class="card">
                  <form action="{{url_for('add_dietplans')}}" enctype="multipart/form-data" method="POST" class="needs-validation" novalidate="">
                    <div class="card-header">
                      <h4>Diet plan form</h4>
                    </div>
                    <div class="card-body">

                      <div class="form-group">
                        <label>Category</label>
                        <select class="form-control" required="" name="dietcat_id">
                          <option value="">Select category</option>
                          {% for cat in view_dietplans %}
                          <option value="{{cat[0]}}">{{cat[1]}}</option>
                          {% endfor %}

                        </select>

                        <div class="invalid-feedback">
                          category name ?
                        </div>
                      </div>


                      <div class="form-group">
                        <label>Recipe name  </label>
                        <input type="text" name="dp_recipename" class="form-control" required="">
                        <div class="invalid-feedback">
                          recipe name ?
                        </div>
                      </div>

                      <div class="form-group">
                        <label>Meal type</label>
                        
                        <select class = "form-control" name="dp_mealtype" required>
                          <option value=""> Select meal type </option>
                          <option value="Veg">Veg</option>
                          <option value="Non-veg">Non-veg</option>
                        </select>
                        <div class="invalid-feedback">
                          meal type (veg,non veg) ?
                        </div>
                      </div>

                      <div class="form-group">
                        <label>Diet type</label>

                        <select class="form-control" name="dp_diettype" required>
                          <option value="">Select diet type</option>
                          <option value="Bulking">Bulking</option>
                          <option value="Cutting">Cutting</option>
                        </select>

                        <div class="invalid-feedback">
                          for bulking or cutting ?
                        </div>
                      </div>

                      <div class="form-group">
                        <label>Image</label>
                        <input type="file" class="form-control" name="dp_image" required placeholder="image">
                        <div class="invalid-feedback">
                          image?
                        </div>
                      </div>
                      
                      <div class="form-group mb-0">
                        <label>Description	</label>
                        <textarea class="form-control" name="dp_description" required="" placeholder="message"></textarea>
                        <div class="invalid-feedback">
                          what is description ?
                        </div>
                      </div>
                    </div>
                    <div class="card-footer text-right">
                      <button type="submit" class="btn btn-primary">Submit</button>
                    </div>
                  </form>
                </div>
              </div>
              
                
                </div>
              </div>
            </div>
          </div>
        </section>

        {% endblock %}
