{% extends "admin/layout.html" %}

{% block content %}

<!-- Main Content -->
      <div class="main-content">
        <section class="section">
          <div class="section-body">
            <div class="row">
              <div class="col-12 col-md-6 col-lg-6">
                
                <div class="card">
                  <form action="{{ url_for('update_steps') }}" method="POST"  enctype="multipart/form-data" class="needs-validation" novalidate="">
                    {% for j in view_resteps %}
                    <div class="card-header">
                      <h4>Update Reciep steps</h4>
                    </div>
                    <div class="card-body">
                      <input type="hidden" name="steps_id" value="{{j[0]}}">
                      <div class="form-group">
                        <label>recipe name</label>
                        <select class="form-control" required name="diet_id">
    <option value="">Select category</option>

    {% for cat in view_dietplans %}
      <option value="{{ cat[0] }}" {% if cat[0]|int == j[1]|int %}selected{% endif %}>
        {{ cat[2] }}
      </option>
    {% endfor %}

  </select>
                        
                      </div>
                      
                      <div class="form-group mb-0">
                        <label>Description	</label>
                        <textarea class="form-control" name="st_description" required="">{{j[2]}}</textarea>
                        <div class="invalid-feedback">
                          what is description ?
                        </div>
                      </div>
                    </div>
                      {% endfor %}
                    <div class="card-footer text-right">
                      <button type="submit" class="btn btn-primary">Update</button>
                      <a href="{{ url_for('view_resteps')}}" class="btn btn-secondary">Cancel</a>
                    </div>
                  </form>
                </div>
              </div>
              
                  </form>
                </div>
              </div>
            </div>
          </div>
        </section>

        {% endblock %}
