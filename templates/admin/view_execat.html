{% extends "admin/layout.html" %}

{% block content %}

<div class="main-content">
  <section class="section">
    <div class="section-body">
      <div class="row">
        <div class="col-12 col-md-6 col-lg-11">
          <div class="card">
            <div class="card-header">
              <h4>Exercise category Table</h4>
            </div>
            <div class="card-body">

              <table class="table table-bordered table-md">
                <tr>
                  <th>#</th>
                  <th>Category Name</th>
                  <th>Exercise Image</th>
                  <th>Exercise description</th>

                  <th>Action</th>
                </tr>


                <tbody>
                  {% set count=1 %}
                  {% for pcat in view_execat %}
                  {% set count = loop.index %}
                  <tr>
                    <td>{{count}}</td>
                    <td>{{pcat[1]}}</td>
                    <td><img src="{{pcat[2]}}" height="100" width="100"></td>
                    <td>{{pcat[3]}}</td>
                    <td>
                      <a class="btn btn-primary"
                        href="{{url_for('edit_execat',cat_id=pcat[0])}}">Edit</a>
                        <a class="btn btn-danger" href="{{url_for('delete_execat',cat_id=pcat[0])}}" onclick="return confirm('Are you sure to delete this category?')">Delete</a>
                    </td>
                    
                  </tr>

                  {% endfor %}
                </tbody>

              </table>

            </div>

          </div>
        </div>
      </div>

    </div>
  </section>
</div>

{% endblock %}
