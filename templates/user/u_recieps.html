{% extends "user/u_layout.html" %}
{% block content %}
<!-- ============== S-OUR-PROGRAMS ============== -->
	<section class="s-our-programs" style="background-image: url(assets/img/bg-programs.jpg);">
		<div class="mask"></div>
		<div class="container">
			<h2 class="title-decor">Diet<span>Recieps</span></h2>
			<p class="slogan"></p>
			<div class="row">
                {% for j in data %}
				<div class="col-sm-6 col-md-3 program-col">
					<div class="program-item">
						<div class="program-item-front" style="background-image: url(/static/user/assets/img/programs-1.jpg);">
							<div class="program-item-inner">
								<h3>{{j[1]}}</h3>
							</div>
						</div>
						<div class="program-item-back" style="background-image: url(/static/user/assets/img/programs-1.jpg);">
							<div class="program-item-inner">
								<h3>{{j[1]}}</h3>
								<a href="#" class="btn">More</a>
							</div>
						</div>
					</div>
				</div>
				{% endfor %}
			</div>
		</div>
	</section>
	<!-- ============ S-OUR-PROGRAMS END ============ -->





{% endblock %}
