{% extends "user/u_layout.html" %}

{% block content %}
<!-- =============== HEADER-TITLE =============== -->
<section class="s-header-title" style="background-image: url(/static/user/assets/img/bg-1-min.png);">
    <div class="container">
        <h1 class="title">Product Details</h1>
        <ul class="breadcrambs">
            <li><a href="{{ url_for('u_dashboard') }}">Home</a></li>
            <li>Product Details</li>
        </ul>
    </div>
</section>
<!-- ============= HEADER-TITLE END ============= -->
<!-- ============== PRODUCT INFO  ============== -->
<section class="s-about">
    <div class="container">
        <img class="about-effect-tringle" src="/static/user/assets/img/tringle-about-top.svg" alt="img">
        <div class="row about-row">
            {% for j in data %}
            <div class="col-md-5 about-img-col">
                <div class="about-img-cover">
                    <div class="product-img">
                        <img src="../{{j[4]}}" alt="img" style="width:100%; border-radius:15px;">
                    </div>
                    <!-- <div class="about-img-2">
							<img src="assets/img/about-top-2.jpg" alt="img">
						</div> -->
                </div>
            </div>
            <div class="col-md-7 about-info-cover">
                <h2 class="title-decor"><span style="text-transform: capitalize;">{{ j[1] }}</span></h2>
                <div class="text">

                    <p>{{ j[5] }}</p>
                </div>
                <h3>Price: {{ j[3] }} </h3>
                <br><br><br>
               <a href="#" class="btn">Add to Cart</a>
            </div>
            {% endfor %}
        </div>
    </div>
    </div>
</section>
<!-- ============  PRODUCT INFO END ============ -->
