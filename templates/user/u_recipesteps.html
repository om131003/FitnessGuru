{% extends "user/u_layout.html" %}
{% block content %}

<section class="s-about">
	<div class="container">
		<img class="about-effect-tringle" src="/static/user/assets/img/tringle-about-top.svg" alt="img">

		{% for j in data %}

		<!-- HEADING ABOVE -->
		<div class="row">
			<div class="col-md-12 text-center">
				<h2 class="title-decor">Recipe <span>Details</span></h2>
				<h3 style="font-size: 45px;  font-weight: 900; color:#f23849; text-transform: capitalize;">{{j[1]}}</h3>
				<br>
			</div>
		</div>

		<!-- CONTENT ROW -->
		<div class="row about-row align-items-center">

			<!-- LEFT SIDE (EXPLANATION) -->
			<div class="col-md-7 about-info-cover">
				
				<h3>Ingredients:</h3>
				<p>{{j[4]}}</p>

				<br>

				<h3>Steps:</h3>
				<p>{{j[3]}}</p>

			</div>

			<!-- RIGHT SIDE (IMAGE) -->
			<div class="col-md-5 about-img-col">
				<div class="about-img-cover">
					<div class="about-img-1">
						<img src="../{{j[2]}}" alt="recipe image" style="width:100%; border-radius:15px;">
					</div>
				</div>
			</div>

		</div>

		{% endfor %}

	</div>
</section>
<br>
<br>

{% endblock %}
